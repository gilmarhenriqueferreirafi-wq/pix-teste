name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Prepare Pages artifact
        run: |
          mkdir output
          shopt -s dotglob
          for f in *; do
            if [ "$f" != ".github" ] && [ "$f" != ".git" ] && [ "$f" != "output" ]; then
              cp -R "$f" output/
            fi
          done

      - uses: actions/configure-pages@v4
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v5
        with:
          path: output

      - uses: actions/deploy-pages@v1
