<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gerador Pix</title>
  <link rel="stylesheet" href="stelles.css">
</head>
<body>
  <div class="container">
    <h1>Gerador de QR Code Pix</h1>

    <label for="amount">Valor</label>
    <input id="amount" type="text" placeholder="Digite o valor em reais" />

    <button onclick="generatePix()">Gerar QR Code</button>

    <div id="message" style="margin-top:14px; color:#b00;"></div>
    <div id="timer"><div id="timerBar"></div></div>
    <div id="qr"></div>
    <pre id="payload" style="margin-top:12px; background:#f4f4f9; padding:10px; border-radius:8px; overflow:auto; display:none; white-space:pre-wrap;"></pre>
    <h2 style="margin-top:18px; font-size:16px;">Últimos Pix (neste dispositivo)</h2>
    <div id="history" style="margin-top:8px; color:#333;"></div>
    <button id="clearHistory" style="margin-top:8px; display:none; background:#eee; border:1px solid #ccc; padding:8px; border-radius:8px; cursor:pointer;">Limpar histórico</button>

    <button id="historyToggle" title="Histórico">⋯</button>
    <div id="historyPanel" role="dialog" aria-labelledby="historyTitle">
      <h3 id="historyTitle">Últimos Pix (neste dispositivo)</h3>
      <div id="historyPanelContent"></div>
      <div style="display:flex; gap:8px; margin-top:10px; justify-content:flex-end;">
        <button id="closeHistory" style="background:#eee;border:1px solid #ccc;padding:8px 10px;border-radius:8px;cursor:pointer;">Fechar</button>
      </div>
    </div>
  </div>

  <script>
    let qrTimeoutId = null;
    let qrIntervalId = null;

    function makeField(id, value) {
      const len = value.length;
      const lenText = len < 10 ? '0' + len : String(len);
      return id + lenText + value;
    }

    function calcCrc16(data) {
      let crc = 0xFFFF;
      for (let i = 0; i < data.length; i++) {
        crc ^= data.charCodeAt(i) << 8;
        for (let bit = 0; bit < 8; bit++) {
          if (crc & 0x8000) {
            crc = (crc << 1) ^ 0x1021;
          } else {
            crc <<= 1;
          }
          crc &= 0xFFFF;
        }
      }
      return crc;
    }

    function normalizeAmount(amount) {
      amount = amount.trim().replace(',', '.');
      if (amount.startsWith('.')) amount = '0' + amount;
      if (amount === '') return '';
      let clean = '';
      let dotSeen = false;
      for (let char of amount) {
        if (char >= '0' && char <= '9') {
          clean += char;
        } else if (char === '.' && !dotSeen) {
          dotSeen = true;
          clean += char;
        }
      }
      const dotPos = clean.indexOf('.');
      if (dotPos < 0) {
        clean += '.00';
      } else {
        const decimals = clean.length - dotPos - 1;
        if (decimals === 0) clean += '00';
        else if (decimals === 1) clean += '0';
        else if (decimals > 2) clean = clean.substring(0, dotPos + 3);
      }
      if (clean === '.00' || clean === '') return '';
      return clean;
    }

    function sanitizeText(text) {
      text = text.trim().toUpperCase();
      const accents = {
        'Á':'A','À':'A','Â':'A','Ã':'A','Ä':'A','Å':'A',
        'É':'E','È':'E','Ê':'E','Ë':'E',
        'Í':'I','Ì':'I','Î':'I','Ï':'I',
        'Ó':'O','Ò':'O','Ô':'O','Õ':'O','Ö':'O',
        'Ú':'U','Ù':'U','Û':'U','Ü':'U',
        'Ç':'C','Ñ':'N'
      };
      let result = '';
      for (let char of text) {
        if (accents[char]) char = accents[char];
        if (/^[A-Z0-9 \-\.\&\/\:]+$/.test(char)) {
          result += char;
        }
      }
      return result;
    }

    function normalizePixKey(key) {
      key = key.trim();
      if (!key) return '';

      const onlyDigits = key.replace(/\D/g, '');
      if (onlyDigits.length === 11 || onlyDigits.length === 14) {
        return onlyDigits; // CPF ou CNPJ
      }

      // Telefone Pix pode começar com +55 ou 55 e conter parênteses/hífens/espaços
      if (/^\+?[0-9\s\-()]+$/.test(key)) {
        let cleaned = key.replace(/[\s\-()]/g, '');
        return cleaned;
      }

      // Email Pix
      const email = key.replace(/\s+/g, '');
      if (/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        return email.toLowerCase();
      }

      // Chave aleatória Pix: aceita UUID com hífens, letras, números, underscore e pontos
      if (/^[A-Za-z0-9_.-]+$/.test(key)) {
        return key;
      }

      return '';
    }

    function createPixPayload(pixKey, receiverName, receiverCity, txid, amount) {
      // garantir txid compatível (remover caracteres inválidos e limitar tamanho)
      txid = sanitizeTxid(txid);
      receiverName = sanitizeText(receiverName);
      receiverCity = sanitizeText(receiverCity);
      const merchantAccountInfo = makeField('00', 'BR.GOV.BCB.PIX') + makeField('01', pixKey);
      let payload = '';
      payload += makeField('00', '01');
      payload += makeField('26', merchantAccountInfo);
      payload += makeField('52', '0000');
      payload += makeField('53', '986');
      if (amount.length > 0) {
        payload += makeField('54', amount);
      }
      payload += makeField('58', 'BR');
      payload += makeField('59', receiverName);
      payload += makeField('60', receiverCity);
      payload += makeField('62', makeField('05', txid));
      payload += '6304';
      const crc = calcCrc16(payload);
      const crcText = crc.toString(16).toUpperCase().padStart(4, '0');
      payload += crcText;
      return payload;
    }
    function sanitizeTxid(t) {
      if (!t) return '';
      // remover espaços e hífens e manter apenas alfanuméricos
      const cleaned = String(t).replace(/[^A-Za-z0-9]/g, '');
      return cleaned.slice(0, 25);
    }
    function generatePix() {
      // usar chave aleatória (fixa) informada
      const fixedPixKey = '94bf38c0-a4df-4c34-9b82-9c7cd172a448';
      const pixKey = normalizePixKey(fixedPixKey);
      const amount = normalizeAmount(document.getElementById('amount').value);
      const message = document.getElementById('message');
      message.textContent = '';

      const receiverName = 'Milena';
      const receiverCity = 'ITATIAÇU';
      // gerar txid curto (máx 25 chars) — alguns apps rejeitam txid muito longo (UUID 36 chars)
      let txid = '';
      if (typeof crypto !== 'undefined' && crypto.randomUUID) {
        txid = crypto.randomUUID().replace(/-/g, '').slice(0, 25);
      } else {
        txid = ('tx' + Date.now().toString(36) + Math.random().toString(36).slice(2, 10)).slice(0, 25);
      }

      if (!pixKey) {
        message.textContent = 'A chave Pix fixa no código é inválida.';
        return;
      }
      if (!amount) {
        message.textContent = 'Digite um valor válido para o Pix.';
        return;
      }

      const payload = createPixPayload(pixKey, receiverName, receiverCity, txid, amount);
      // salvar no histórico local antes de exibir
      saveToHistory({ txid: txid, amount: amount, t: new Date().toISOString(), payload: payload });
      const qrUrl = 'https://api.qrserver.com/v1/create-qr-code/?size=320x320&data=' + encodeURIComponent(payload);
      document.getElementById('qr').innerHTML = '<img src="' + qrUrl + '" alt="QR Code Pix" />';
      const payloadEl = document.getElementById('payload');
      if (payloadEl) {
        payloadEl.style.display = 'block';
        payloadEl.textContent = payload;
      }

      const timer = document.getElementById('timer');
      const timerBar = document.getElementById('timerBar');
      timer.style.display = 'block';
      timerBar.style.width = '100%';

      if (qrTimeoutId) clearTimeout(qrTimeoutId);
      if (qrIntervalId) clearInterval(qrIntervalId);

      const duration = 60000;
      const start = Date.now();
      qrIntervalId = setInterval(() => {
        const elapsed = Date.now() - start;
        const progress = Math.max(0, 100 - (elapsed / duration) * 100);
        timerBar.style.width = progress + '%';
      }, 100);

      qrTimeoutId = setTimeout(() => {
        document.getElementById('qr').innerHTML = '';
        timer.style.display = 'none';
        timerBar.style.width = '100%';
        message.textContent = 'QR code expirou. Gere um novo se precisar pagar.';
        const payloadEl = document.getElementById('payload');
        if (payloadEl) {
          payloadEl.style.display = 'none';
          payloadEl.textContent = '';
        }
        clearInterval(qrIntervalId);
        qrIntervalId = null;
        qrTimeoutId = null;
      }, duration);
    }

    // Local history: salva txid, amount e timestamp no localStorage
    function saveToHistory(entry) {
      try {
        const key = 'pix_history';
        const raw = localStorage.getItem(key);
        const list = raw ? JSON.parse(raw) : [];
        list.unshift(entry);
        // manter últimos 20
        const trimmed = list.slice(0, 20);
        localStorage.setItem(key, JSON.stringify(trimmed));
        renderLastHistory();
      } catch (e) {
        console.error('Erro salvando histórico:', e);
      }
    }

    function loadHistory() {
      try {
        const raw = localStorage.getItem('pix_history');
        return raw ? JSON.parse(raw) : [];
      } catch (e) {
        return [];
      }
    }

    function formatDate(iso) {
      try {
        const d = new Date(iso);
        return d.toLocaleString();
      } catch (e) {
        return iso;
      }
    }

    function renderHistory(containerId = 'history') {
      const list = loadHistory();
      const container = document.getElementById(containerId);
      const clearBtn = document.getElementById('clearHistory');
      if (!container) return;
      container.innerHTML = '';
      if (!list || list.length === 0) {
        container.textContent = 'Nenhum pagamento gerado neste dispositivo ainda.';
        if (clearBtn) clearBtn.style.display = 'none';
        return;
      }
      if (clearBtn) clearBtn.style.display = 'inline-block';
      const ul = document.createElement('div');
      ul.style.display = 'flex';
      ul.style.flexDirection = 'column';
      ul.style.gap = '8px';
      list.forEach(item => {
        const el = document.createElement('div');
        el.style.padding = '8px';
        el.style.border = '1px solid #eee';
        el.style.borderRadius = '8px';
        el.style.background = '#fafafa';
        el.innerHTML = `<div style="font-size:14px; color:#111;"><strong>R$ ${item.amount}</strong> — <span style="color:#666; font-size:12px;">${formatDate(item.t)}</span></div><div style="font-size:12px; color:#444; word-break:break-all;">TXID: ${item.txid}</div>`;
        ul.appendChild(el);
      });
      container.appendChild(ul);
    }

    // render somente o último item na área principal
    function renderLastHistory() {
      const list = loadHistory();
      const container = document.getElementById('history');
      const clearBtn = document.getElementById('clearHistory');
      container.innerHTML = '';
      if (!list || list.length === 0) {
        container.textContent = 'Nenhum pagamento gerado neste dispositivo ainda.';
        if (clearBtn) clearBtn.style.display = 'none';
        return;
      }
      if (clearBtn) clearBtn.style.display = 'inline-block';
      const item = list[0];
      const el = document.createElement('div');
      el.style.padding = '8px';
      el.style.border = '1px solid #eee';
      el.style.borderRadius = '8px';
      el.style.background = '#fafafa';
      el.innerHTML = `<div style="font-size:14px; color:#111;"><strong>R$ ${item.amount}</strong> — <span style="color:#666; font-size:12px;">${formatDate(item.t)}</span></div><div style="font-size:12px; color:#444; word-break:break-all;">TXID: ${item.txid}</div>`;
      container.appendChild(el);
    }

    document.getElementById('clearHistory').addEventListener('click', () => {
      localStorage.removeItem('pix_history');
      renderLastHistory();
    });

    // export removed

    // toggles do painel flutuante
    document.getElementById('historyToggle').addEventListener('click', () => {
      const panel = document.getElementById('historyPanel');
      const visible = panel.style.display === 'block';
      if (!visible) {
        renderHistory('historyPanelContent');
        panel.style.display = 'block';
      } else {
        panel.style.display = 'none';
      }
    });
    document.getElementById('closeHistory').addEventListener('click', () => {
      document.getElementById('historyPanel').style.display = 'none';
    });

    // render inicial (mostrar somente o último na página)
    document.addEventListener('DOMContentLoaded', () => renderLastHistory());
  </script>
</body>
</html>
